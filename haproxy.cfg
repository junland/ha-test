global
    log stdout format raw local0 info
    log stdout format raw local0 notice

    stats socket /run/haproxy/admin.sock mode 660 level admin

    tune.ssl.default-dh-param 2048
    tune.h2.initial-window-size 524288
    maxconn      4000

    # Disable OCSP stapling and other options
    ssl-default-bind-options no-tlsv10 no-tlsv11

    # Use IPv4 for OCSP checks
    httpclient.resolvers.prefer ipv4

defaults
    mode                    http
    log                     global
    option                  httplog
    option                  dontlognull
    option                  http-server-close
    option                  redispatch
    retries                 10
    timeout connect         5s
    timeout server          60s
    timeout client          60s
    timeout tunnel          1h
    maxconn                 3000

resolvers container_dns
    parse-resolv-conf
    timeout retry   10s
    resolve_retries 10
    hold valid 5s

cache default_cache
    total-max-size  4088  # MB
    max-object-size 10000 # bytes
    max-age         30    # seconds

frontend http_in
    bind *:8080

    compression algo deflate gzip
    compression type text/html text/plain text/css application/javascript application/json application/xml application/rss+xml application/atom+xml font/ttf font/otf font/eot font/woff font/woff2 image/svg+xml image/x-icon

    default_backend homeassistant

backend homeassistant
    balance roundrobin
    mode http
    option forwardfor

    http-request set-header X-Forwarded-Proto http if { ssl_fc }
    http-request set-header X-Forwarded-Proto http
    http-request add-header X-Forwarded-For %[src]

    server s1 homeassistant:8123 check resolvers container_dns resolve-prefer ipv4 inter 3s rise 3 fall 3
