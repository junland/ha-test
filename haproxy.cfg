###
# HAProxy main config
###

global
    log stdout format raw local0 info
    log stdout format raw local0 notice

    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s

    tune.ssl.default-dh-param 2048
    tune.h2.initial-window-size 524288
    tune.bufsize 32768
    maxconn      4000

    # Modern SSL/TLS configuration
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options prefer-client-ciphers no-sslv3 no-tlsv10 no-tlsv11 no-tls-tickets
    ssl-default-server-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    ssl-default-server-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-server-options no-sslv3 no-tlsv10 no-tlsv11 no-tls-tickets

    # Use IPv4 for OCSP checks
    httpclient.resolvers.prefer ipv4

defaults
    mode                    http
    log                     global
    option                  httplog
    option                  dontlognull
    option                  http-server-close
    option                  redispatch
    retries                 10
    timeout connect         5s
    timeout server          60s
    timeout client          60s
    timeout tunnel          1h
    maxconn                 3000

resolvers container_dns
    parse-resolv-conf
    timeout retry   10s
    resolve_retries 10
    hold valid 5s

cache default_cache
    total-max-size  4088  # MB
    max-object-size 10000 # bytes
    max-age         30    # seconds

frontend http-in
    bind :80
    redirect scheme https

frontend https-in
    bind :443 ssl crt /etc/ssl alpn h2,http/1.1

    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains;"

    compression algo deflate gzip
    compression type text/html text/plain text/css application/javascript application/json application/xml application/rss+xml application/atom+xml font/ttf font/otf font/eot font/woff font/woff2 image/svg+xml image/x-icon

    acl is_home hdr_beg(host) -i home

    use_backend home if is_home

    default_backend deny_403

###
# Backends
###

backend deny_403
    mode http
    http-request deny deny_status 400

backend home
    balance roundrobin
    mode http
    option forwardfor

    http-request add-header X-Forwarded-Proto https if { ssl_fc }    

    server s1 homeassistant:8123 check resolvers container_dns resolve-prefer ipv4 inter 3s rise 3 fall 3 ws h1



